<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security+ Practice Quiz</title>
  <link rel="stylesheet" href="style.css?v=mistakes-20260617" />
</head>
<body>
  <main class="quiz-container">
    <h1>CompTIA Security+ Practice Quiz</h1>

    <div class="top-bar">
      <p id="progress">Loading...</p>
      <button id="resetBtn">Reset Progress</button>
    </div>

    <div class="mode-bar">
      <button id="allBtn" class="secondary-btn">All Questions</button>
      <button id="mistakesBtn" class="secondary-btn">Review Mistakes (<span id="mistakeCount">0</span>)</button>
      <button id="clearMistakesBtn" class="secondary-btn danger-btn">Clear Mistakes</button>
    </div>

    <section class="card">
      <p id="domain"></p>
      <h2 id="question">Loading question...</h2>
      <div id="options"></div>
      <p id="feedback"></p>
      <p id="explanation"></p>
      <button id="skipBtn" type="button">Skip Question</button>
    <button id="nextBtn" disabled>Next Question</button>
    </section>
  </main>

  <script src="app.js?v=skip2"></script>
</body>
</html>
